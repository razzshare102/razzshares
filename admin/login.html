<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — RazzShares Web3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
</head>
<body>
<div class="auth-page">
  <!-- Background orbs -->
  <div style="position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(139,92,246,0.15),transparent);filter:blur(80px);top:-100px;left:-100px;pointer-events:none;"></div>
  <div style="position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(6,182,212,0.1),transparent);filter:blur:80px;bottom:-100px;right:-100px;pointer-events:none;"></div>

  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">💎</div>
      <div class="auth-title">Admin Panel</div>
      <div class="auth-subtitle">Sign in to manage RazzShares Web3</div>
    </div>

    <div class="auth-error" id="auth-error">Invalid credentials. Please try again.</div>

    <form onsubmit="handleLogin(event)" style="margin-top:8px;">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-input" id="login-email" placeholder="admin@razzshares.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div style="position:relative;">
          <input type="password" class="form-input" id="login-password" placeholder="••••••••••" required autocomplete="current-password" style="padding-right:44px;" />
          <button type="button" onclick="togglePassword()" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:16px;" id="pw-toggle">👁</button>
        </div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-secondary);cursor:pointer;">
          <input type="checkbox" style="accent-color:#8B5CF6;" /> Remember me
        </label>
        <a href="#" style="font-size:13px;color:#8B5CF6;text-decoration:none;">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary-admin" style="width:100%;justify-content:center;padding:14px;" id="login-btn">
        <span id="login-btn-text">Sign In to Admin Panel</span>
      </button>
    </form>

    <div style="margin-top:24px;padding:16px;background:rgba(255,255,255,0.03);border-radius:10px;border:1px solid rgba(255,255,255,0.06);">
      <div style="font-size:12px;color:var(--text-secondary);text-align:center;margin-bottom:8px;">Demo credentials</div>
      <div style="font-size:13px;color:#C4B5FD;text-align:center;">admin@razzshares.com / admin123</div>
    </div>

    <div style="margin-top:20px;text-align:center;">
      <a href="../index.html" style="font-size:13px;color:var(--text-secondary);text-decoration:none;display:inline-flex;align-items:center;gap:6px;">← Back to Website</a>
    </div>
  </div>
</div>

<script>
  function togglePassword() {
    const input = document.getElementById('login-password');
    const btn = document.getElementById('pw-toggle');
    if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
    else { input.type = 'password'; btn.textContent = '👁'; }
  }

  function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('login-email').value;
    const pass  = document.getElementById('login-password').value;
    const btn   = document.getElementById('login-btn');
    const errEl = document.getElementById('auth-error');

    btn.disabled = true;
    document.getElementById('login-btn-text').textContent = 'Signing in...';
    errEl.classList.remove('show');

    setTimeout(() => {
      if (email === 'admin@razzshares.com' && pass === 'admin123') {
        sessionStorage.setItem('rzAdmin', '1');
        sessionStorage.setItem('rzAdminEmail', email);
        window.location.href = 'index.html';
      } else {
        errEl.classList.add('show');
        btn.disabled = false;
        document.getElementById('login-btn-text').textContent = 'Sign In to Admin Panel';
      }
    }, 800);
  }

  // If already logged in, redirect
  if (sessionStorage.getItem('rzAdmin')) window.location.href = 'index.html';
</script>
</body>
</html>
